<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AMS · GP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --brand: #1a2c4e;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --pos: #10b981;
      --neg: #ef4444;
      --radius: 8px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.2;
    }

    header {
      background: var(--brand);
      color: white;
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .brand { font-weight: 800; font-size: 13px; letter-spacing: -0.3px; }

    main { max-width: 1100px; margin: 0 auto; padding: 12px; }

    /* KPIs superiores */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: white;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }
    .stat-label { font-size: 10px; text-transform: uppercase; color: var(--text-muted); font-weight: 700; margin-bottom: 4px; }
    .stat-val { font-size: 18px; font-weight: 800; white-space: nowrap; }

    /* Grilla de tarjetas — 2 columnas fijas en escritorio */
    .grid-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .card {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .card-header {
      background: var(--brand);
      color: white;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .card-header h2 { margin: 0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    .card-header .tot-val { font-weight: 700; font-size: 13px; white-space: nowrap; }

    /* Subsección */
    .group-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
      background: #f1f5f9;
    }
    .group-title-input {
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      padding: 0;
      width: 100%;
      min-width: 0;
    }
    .group-title-input:focus { outline: none; }
    .group-sum {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .group-toggle {
      cursor: pointer;
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 10px;
      flex-shrink: 0;
      transition: transform 0.2s ease;
    }
    .group-toggle.collapsed {
      transform: rotate(-90deg);
    }
    .group-items.collapsed {
      display: none;
    }

    /* ── Fila de ítem: flexbox con anchos fijos en px ── */
    .row-item {
      display: flex;
      align-items: center;
      border-bottom: 1px solid #f1f5f9;
      min-height: 34px;
      padding: 0 6px 0 12px;
      gap: 6px;
    }

    /* Concepto: ocupa el espacio restante, nunca desborda */
    .col-concept {
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }
    /* Tag: ancho fijo, no crece ni encoge */
    .col-tag   { width: 64px;  flex-shrink: 0; }
    /* Valor: ancho fijo, alineado a la derecha */
    .col-val   { width: 82px;  flex-shrink: 0; text-align: right; }
    /* Borrar: ancho mínimo fijo, siempre visible */
    .col-del   { width: 22px;  flex-shrink: 0; display: flex; align-items: center; justify-content: center; }

    /* Inputs de texto (concepto, grupo) */
    input[type="text"], input:not([type]) {
      border: 1px solid transparent;
      background: transparent;
      font-family: inherit;
      font-size: 12px;
      color: inherit;
      width: 100%;
      padding: 2px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    input:not([type]):focus { outline: none; background: #fffdeb; border-radius: 3px; padding: 2px 4px; }

    /* Valor: display como span con € — click activa input */
    .val-display {
      display: block;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
      padding: 3px 4px;
      border-radius: 4px;
      text-align: right;
      transition: background 0.12s;
      width: 100%;
    }
    .val-display:hover { background: #f1f5f9; }
    .val-display .euro-icon { font-size: 9px; opacity: 0.6; margin-right: 1px; }

    /* Input numérico activo (reemplaza al span) */
    .val-input {
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      text-align: right;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fffdeb;
      padding: 2px 4px;
      width: 100%;
      color: inherit;
    }
    .val-input:focus { outline: none; border-color: var(--brand); }

    .txt-pos { color: var(--pos); }
    .txt-neg { color: var(--neg); }

    /* Tag badge */
    .tag-select {
      font-size: 9px;
      font-weight: 700;
      background: #f1f5f9;
      color: #475569;
      padding: 2px 4px;
      border-radius: 4px;
      text-transform: uppercase;
      width: 100%;
      cursor: pointer;
      appearance: none;
      border: none;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tag-select:focus { outline: none; background: #e2e8f0; }

    /* Botón borrar */
    .btn-del {
      color: #cbd5e1;
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      user-select: none;
      border-radius: 4px;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-del:hover { color: var(--neg); background: #fef2f2; }

    /* Añadir concepto */
    .btn-add-item {
      padding: 7px 12px;
      font-size: 10px;
      color: var(--brand);
      font-weight: 700;
      cursor: pointer;
      opacity: 0.5;
      border-top: 1px solid #f1f5f9;
      letter-spacing: 0.2px;
    }
    .btn-add-item:hover { opacity: 1; background: #f8fafc; }

    /* Añadir sección */
    .btn-add-group {
      padding: 7px 12px;
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 600;
      cursor: pointer;
      opacity: 0.6;
      border-top: 2px solid var(--border);
      letter-spacing: 0.2px;
    }
    .btn-add-group:hover { opacity: 1; background: #f1f5f9; color: var(--brand); }

    /* Botones import/export en header */
    .btn-io {
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      color: white;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 5px;
      padding: 4px 9px;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.2px;
    }
    .btn-io:hover { background: rgba(255,255,255,0.22); }
    .btn-io.btn-light {
      color: var(--brand);
      background: white;
      border-color: var(--border);
    }
    .btn-io.btn-light:hover { background: #f1f5f9; }
    .btn-asesor { background: rgba(99,102,241,0.2); border-color: rgba(99,102,241,0.45); }
    .btn-asesor:hover { background: rgba(99,102,241,0.38); }
    .btn-asesor.copied { background: rgba(16,185,129,0.2); border-color: rgba(16,185,129,0.5); color: #6ee7b7; }

    /* Botón guardar */
    .btn-save { transition: background 0.2s, border-color 0.2s; }
    .btn-save.dirty {
      background: rgba(251,191,36,0.25);
      border-color: rgba(251,191,36,0.7);
      color: #fbbf24;
      animation: pulse-save 2s infinite;
    }
    @keyframes pulse-save {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.65; }
    }

    /* Panel de configuración */
    .config-panel {
      display: none;
      background: #0f1e35;
      border-bottom: 2px solid rgba(255,255,255,0.08);
      padding: 12px 16px;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .config-panel.open { display: flex; }
    .config-field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 180px; }
    .config-field label { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.5px; }
    .config-field input {
      font-family: inherit; font-size: 12px; color: white;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 5px; padding: 5px 8px; width: 100%;
    }
    .config-field input:focus { outline: none; border-color: rgba(255,255,255,0.4); }
    .config-status { font-size: 10px; font-weight: 600; white-space: nowrap; align-self: flex-end; padding-bottom: 6px; }
    .status-ok  { color: var(--pos); }
    .status-err { color: var(--neg); }
    .status-idle { color: rgba(255,255,255,0.35); }

    /* ── Tabs ── */
    .tab-nav {
      display: flex;
      gap: 4px;
      margin-bottom: 14px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0;
    }
    .tab-btn {
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      background: none;
      border: none;
      padding: 7px 14px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ── Panel de ratios ── */
    .ratios-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .ratio-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ratio-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .ratio-name { font-size: 11px; font-weight: 700; color: var(--text); }
    .ratio-objetivo {
      font-size: 9px; font-weight: 700; white-space: nowrap;
      padding: 2px 6px; border-radius: 10px; flex-shrink: 0;
    }
    .obj-ok   { background: #d1fae5; color: #065f46; }
    .obj-warn { background: #fef3c7; color: #92400e; }
    .obj-crit { background: #fee2e2; color: #991b1b; }
    .ratio-value { font-size: 22px; font-weight: 800; line-height: 1; }
    .ratio-bar-wrap { background: #f1f5f9; border-radius: 4px; height: 4px; overflow: hidden; }
    .ratio-bar { height: 100%; border-radius: 4px; transition: width 0.4s; }
    .ratio-formula { font-size: 10px; color: var(--text-muted); }

    /* ── Movimientos ── */
    .mov-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .mov-filters {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
    }
    .mov-filter-group {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .mov-filter-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .mov-select {
      font-family: inherit;
      font-size: 11px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 6px;
      background: white;
      color: var(--text);
      cursor: pointer;
    }
    .mov-kpi {
      margin-left: auto;
      display: flex;
      gap: 16px;
      font-size: 12px;
    }
    .mov-kpi span { color: var(--text-muted); }
    .mov-kpi strong { font-weight: 700; }
    .mov-group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: #f1f5f9;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    .mov-group-header .mov-group-total { font-size: 12px; color: var(--text); }
    .mov-row {
      display: flex;
      align-items: center;
      padding: 5px 12px;
      border-bottom: 1px solid #f8fafc;
      gap: 8px;
      font-size: 12px;
    }
    .mov-row:hover { background: #f8fafc; }
    .mov-fecha { color: var(--text-muted); font-size: 11px; flex-shrink: 0; width: 72px; cursor: text; }
    .mov-fecha-input {
      font-family: inherit;
      font-size: 11px;
      color: var(--text-muted);
      border: none;
      border-bottom: 1px solid var(--brand);
      background: transparent;
      outline: none;
      width: 72px;
      flex-shrink: 0;
      padding: 0;
    }
    .mov-desc { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mov-tag-sel {
      font-family: inherit;
      font-size: 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 4px;
      background: white;
      color: var(--text);
      flex-shrink: 0;
      width: 75%;
      max-width: 90px;
    }
    .mov-importe { font-weight: 700; text-align: right; flex-shrink: 0; width: 72px; font-size: 12px; }
    .mov-interno { opacity: 0.4; }
    .mov-desc-input {
      font-family: inherit;
      font-size: 12px;
      border: none;
      border-bottom: 1px solid var(--brand);
      background: transparent;
      color: var(--text);
      flex: 1;
      min-width: 0;
      outline: none;
      padding: 0;
    }
    .mov-edit-panel {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px 4px 12px;
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
    }
    .mov-amort-check { accent-color: var(--brand); cursor: pointer; }
    .mov-amort-label { cursor: pointer; }

    /* Selects dentro de card-header oscuro */
    .card-header .mov-select {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.2);
      color: white;
    }
    .card-header .mov-select option { background: var(--brand); color: white; }

    @media (max-width: 640px) {
      .grid-container { grid-template-columns: 1fr; }
      .col-tag { width: 56px; }
      .col-val { width: 76px; }
      .ratios-grid { grid-template-columns: 1fr; }
      .mov-kpi { margin-left: 0; width: 100%; order: 10; }
      .mov-search-wrap { width: 100%; order: 9; }
    }

    /* Modal de reglas */
    .rules-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    .rules-backdrop.open { display: flex; }
    .rules-modal {
      background: white;
      border-radius: var(--radius);
      padding: 20px;
      width: 420px;
      max-width: 95vw;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.22);
    }
    .rules-modal h3 { margin: 0 0 14px; font-size: 13px; font-weight: 700; }
    .rules-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .rules-row:last-child { border-bottom: none; }
    .rules-add { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .rules-input { flex: 1; min-width: 110px; padding: 5px 8px; border: 1px solid var(--border); border-radius: 5px; font-size: 12px; }
    .rules-select { padding: 5px 6px; border: 1px solid var(--border); border-radius: 5px; font-size: 12px; background: white; }
  </style>
</head>
<body>

<header>
  <div class="brand">AMS <span style="opacity:0.55; font-weight:500">· GP</span></div>
  <div style="display:flex; align-items:center; gap:8px;">
    <button class="btn-io btn-save" id="btn-save" onclick="saveToWorker()" title="Guardar en la nube">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:3px"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Guardar
    </button>
    <button class="btn-io" onclick="toggleConfig()" id="btn-cfg">⚙ Config</button>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="importData(this)">
    <div id="date" style="font-size:10px; font-weight:600; opacity:0.7;"></div>
  </div>
</header>

<div class="config-panel" id="config-panel">
  <div class="config-field">
    <label>URL del Worker (Cloudflare)</label>
    <input id="cfg-url" type="url" placeholder="https://mi-worker.workers.dev/data">
  </div>
  <div class="config-field">
    <label>Token de acceso</label>
    <input id="cfg-token" type="password" placeholder="Bearer token">
  </div>
  <button class="btn-io" onclick="saveConfig()" style="padding:6px 12px; height:fit-content;">Guardar config</button>
  <button class="btn-io" onclick="loadFromWorker()" style="padding:6px 12px; height:fit-content;">↓ Cargar</button>
  <div style="width:1px; background:rgba(255,255,255,0.12); align-self:stretch; margin:0 4px;"></div>
  <button class="btn-io" onclick="exportData()" style="padding:6px 12px; height:fit-content;">↓ Exportar JSON</button>
  <button class="btn-io" onclick="document.getElementById('fileInput').click()" style="padding:6px 12px; height:fit-content;">↑ Importar JSON</button>
  <span class="config-status status-idle" id="cfg-status">—</span>
</div>

<main>
  <div class="summary-grid">
    <div class="stat-card">
      <div class="stat-label">Patrimonio Neto</div>
      <div id="neto-total" class="stat-val">0 €</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Ahorro Mensual</div>
      <div id="ahorro-total" class="stat-val">0 €</div>
    </div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" id="tab-btn-posicion" onclick="switchTab('posicion')">Posición</button>
    <button class="tab-btn" id="tab-btn-analisis" onclick="switchTab('analisis')">Análisis</button>
    <button class="tab-btn" id="tab-btn-movimientos" onclick="switchTab('movimientos')">Movimientos</button>
  </div>

  <div id="tab-posicion">
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
      <button class="btn-io btn-asesor" id="btn-asesor" onclick="copyToAsesor()" title="Copiar prompt de balance para asesor IA">✦ Asesor</button>
    </div>
    <div class="grid-container">
      <div id="container-ingresos" class="card-wrap"></div>
      <div id="container-gastos" class="card-wrap"></div>
      <div id="container-activos" class="card-wrap"></div>
      <div id="container-pasivos" class="card-wrap"></div>
    </div>
  </div>

  <div id="tab-analisis" style="display:none">
    <div class="ratios-grid" id="ratios-container"></div>
    <div id="audit-container" style="margin-top:16px"></div>
  </div>

  <div id="tab-movimientos" style="display:none">
    <input type="file" id="csvInput" accept=".csv" style="display:none" onchange="importCSV(this,1)">
    <input type="file" id="csvInput2" accept=".csv" style="display:none" onchange="importCSV(this,2)">
    <input type="file" id="csvInput3" accept=".csv" style="display:none" onchange="importCSV(this,3)">
    <div class="mov-toolbar" style="align-items:flex-end;gap:12px;margin-bottom:14px">
      <div class="mov-filter-group">
        <span class="mov-filter-label">Cuenta</span>
        <select class="mov-select" id="mov-acct-filter" onchange="renderMovimientos()">
          <option value="">Todas</option>
          <option value="1">Cuenta 1</option>
          <option value="2">Cuenta 2</option>
          <option value="3">Cuenta 3</option>
        </select>
      </div>
      <div class="mov-filter-group">
        <span class="mov-filter-label">Año</span>
        <select class="mov-select" id="mov-year-filter" onchange="updatePeriodPills();renderMovimientos()">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="mov-filter-group">
        <span class="mov-filter-label">Mes</span>

<script>
  let state = { ingresos: [], gastos: [], activos: [], pasivos: [] };
  let expandedGroups = {}; // Guardar estado expandido por grupo: "cat-gIdx" => true/false
  let expandedMovGroups = {}; // Estado expandido de grupos en Movimientos
  let sortMovGroups = {};     // Orden de cada grupo: 'fecha'|'asc'|'desc'
  let movEditando = null;     // origIdx del movimiento en edición
  let movEditandoFecha = false; // true si se hizo click en la fecha

  const tagsByCategory = {
    ingresos: ['Trabajo', 'Renta', 'Variable', 'Otros'],
    gastos:   ['Hipoteca', 'Préstamo', 'Mantenimiento propiedades', 'Personal', 'Inversión', 'Inversión propiedades', 'Microgasto'],
    activos:  ['Inmobiliario', 'Financiero', 'Liquidez', 'Pensión'],
    pasivos:  ['Hipoteca', 'Préstamo', 'Tarjeta']
  };

  // Categorías de Movimientos — solo nivel grupo (sin subcategoría)
  const movTagsByCategory = {
    ingresos: ['Ingreso personal', 'Ingreso activos'],
    gastos:   ['Gasto vida', 'Gasto supermercado', 'Gasto transporte', 'Gasto suscripciones', 'Gasto activos', 'Gasto personal', 'Gasto inversión'],
    interno:  ['Interno'],
  };

  function fmt(v) {
    return new Intl.NumberFormat('es-ES', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(v || 0) + ' €';
  }
  function fmtNum(v) {
    return new Intl.NumberFormat('es-ES', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(v || 0);
  }

  function render() {
    const totals = { ingresos: 0, gastos: 0, activos: 0, pasivos: 0 };

    ['ingresos', 'gastos', 'activos', 'pasivos'].forEach(cat => {
      const container = document.getElementById(`container-${cat}`);
      const isPos = (cat === 'ingresos' || cat === 'activos');
      const colorClass = isPos ? 'txt-pos' : 'txt-neg';
      let catTotal = 0;

      let html = `<section class="card">
        <div class="card-header">
          <h2>${cat}</h2>
          <span class="tot-val" id="head-tot-${cat}">0 €</span>
        </div>`;

      state[cat].forEach((group, gIdx) => {
        const gSum = group.items.reduce((s, it) => s + Number(it.value), 0);
        catTotal += gSum;
        const groupKey = `${cat}-${gIdx}`;
        const isExpanded = expandedGroups[groupKey] !== false; // Por defecto expandido

        html += `<div class="group-title-row">
          <span class="group-toggle ${!isExpanded ? 'collapsed' : ''}" onclick="toggleGroup('${cat}',${gIdx})">▼</span>
          <div style="display:flex; gap:6px; align-items:center; flex:1; min-width:0;">
            <input class="group-title-input" value="${group.title}"
                   onchange="state['${cat}'][${gIdx}].title=this.value; render()"
                   onfocus="showDeleteGroupBtn(this, '${cat}', ${gIdx})"
                   onblur="hideDeleteGroupBtn(this)">
            <span class="group-del-btn" style="display:none; font-size:12px; color:var(--text-muted); cursor:pointer; flex-shrink:0; padding:2px 4px;" onmousedown="deleteGroupWithConfirm(event, '${cat}', ${gIdx})" title="Borrar sección">×</span>
          </div>
          <span class="group-sum">${fmt(gSum)}</span>
        </div>`;

        html += `<div class="group-items ${!isExpanded ? 'collapsed' : ''}">`;

        group.items.forEach((item, iIdx) => {
          const opts = tagsByCategory[cat]
            .map(t => `<option value="${t}"${item.type===t?' selected':''}>${t}</option>`)
            .join('');

          html += `<div class="row-item">
            <div class="col-concept">
              <input value="${item.label.replace(/"/g,'&quot;')}"
                     onchange="update('${cat}',${gIdx},${iIdx},'label',this.value)">
            </div>
            <div class="col-tag">
              <select class="tag-select" onchange="update('${cat}',${gIdx},${iIdx},'type',this.value)">${opts}</select>
            </div>
            <div class="col-val">
              <span class="val-display ${colorClass}"
                    onclick="editVal(this,'${cat}',${gIdx},${iIdx})">
                <span class="euro-icon">€</span>${fmtNum(item.value)}
              </span>
            </div>
            <div class="col-del">
              <span class="btn-del" onclick="remove('${cat}',${gIdx},${iIdx})">×</span>
            </div>
          </div>`;
        });

        html += `<div class="btn-add-item" onclick="addItem('${cat}',${gIdx})">+ añadir concepto</div>`;
        html += `</div>`;
      });

      html += `<div class="btn-add-group" onclick="addGroup('${cat}')">+ añadir sección</div>`;
      html += `</section>`;
      container.innerHTML = html;
      totals[cat] = catTotal;
      document.getElementById(`head-tot-${cat}`).textContent = fmt(catTotal);
    });

    const neto   = totals.activos - totals.pasivos;
    const ahorro = totals.ingresos - totals.gastos;

    const netoEl   = document.getElementById('neto-total');
    const ahorroEl = document.getElementById('ahorro-total');
    netoEl.textContent   = fmt(neto);
    netoEl.className     = 'stat-val ' + (neto   >= 0 ? 'txt-pos' : 'txt-neg');
    ahorroEl.textContent = fmt(ahorro);
    ahorroEl.className   = 'stat-val ' + (ahorro >= 0 ? 'txt-pos' : 'txt-neg');
    if (activeTab === 'analisis') renderAnalisis();
  }

  function toggleGroup(cat, gIdx) {
    const groupKey = `${cat}-${gIdx}`;
    expandedGroups[groupKey] = !expandedGroups[groupKey];
    localStorage.setItem('ams_expanded_groups', JSON.stringify(expandedGroups));
    render();
  }

  function showDeleteGroupBtn(input, cat, gIdx) {
    const btn = input.nextElementSibling;
    if (btn && btn.classList.contains('group-del-btn')) {
      btn.style.display = 'block';
    }
  }

  function hideDeleteGroupBtn(input) {
    const btn = input.nextElementSibling;
    if (btn && btn.classList.contains('group-del-btn')) {
      btn.style.display = 'none';
    }
  }

  function deleteGroupWithConfirm(event, cat, gIdx) {
    event.stopPropagation();
    if (confirm(`¿Borrar sección "${state[cat][gIdx].title}"? Esta acción no se puede deshacer.`)) {
      state[cat].splice(gIdx, 1);
      markDirty();
      render();
    }
  }

  /* Click sobre el valor: sustituye el span por un input numérico */
  function editVal(span, c, g, i) {
    const cur  = state[c][g].items[i].value;
    const isPos = (c === 'ingresos' || c === 'activos');
    const input = document.createElement('input');
    input.type      = 'number';
    input.value     = cur;
    input.className = 'val-input ' + (isPos ? 'txt-pos' : 'txt-neg');
    span.replaceWith(input);
    input.focus();
    input.select();
    const save = () => update(c, g, i, 'value', input.value);
    input.addEventListener('blur',    save);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') render(); });
  }

  let isDirty = false;
  function markDirty() {
    if (!isDirty) {
      isDirty = true;
      document.getElementById('btn-save').classList.add('dirty');
    }
  }
  function markClean() {
    isDirty = false;
    document.getElementById('btn-save').classList.remove('dirty');
  }

  function update(c, g, i, f, v) {
    state[c][g].items[i][f] = (f === 'value') ? Number(v) : v.trim();
    markDirty(); render();
  }

  function addItem(c, g) {
    state[c][g].items.push({ label: 'Nuevo concepto', type: tagsByCategory[c][0], value: 0 });
    markDirty(); render();
  }

  function remove(c, g, i) {
    state[c][g].items.splice(i, 1);
    markDirty(); render();
  }

  function addGroup(c) {
    state[c].push({ title: 'Nueva sección', items: [{ label: 'Nuevo concepto', type: tagsByCategory[c][0], value: 0 }] });
    markDirty(); render();
  }

  async function saveToWorker() {
    const url   = localStorage.getItem('ams_worker_url');
    const token = localStorage.getItem('ams_token');
    if (!url || !token) { setStatus('Configura URL y token', 'err'); return; }
    setStatus('Guardando…', 'idle');
    try {
      const res = await fetch(url, {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...state, movimientos, movimientos2, movimientos3, userMovRules })
      });
      if (res.ok) { markClean(); setStatus('✓ Guardado', 'ok'); }
      else setStatus('Error ' + res.status, 'err');
    } catch { setStatus('Sin conexión', 'err'); }
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'ams_gp_' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function importData(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (data.ingresos && data.gastos && data.activos && data.pasivos) {
          state = data;
          render();
        } else {
          alert('Archivo JSON no válido: faltan secciones (ingresos, gastos, activos, pasivos).');
        }
      } catch { alert('Error al leer el archivo JSON.'); }
    };
    reader.readAsText(file);
    input.value = '';
  }

  // ── Config / Cloudflare Worker ──────────────────────────────
  function toggleConfig() {
    const panel = document.getElementById('config-panel');
    const open  = panel.classList.toggle('open');
    if (open) {
      document.getElementById('cfg-url').value   = localStorage.getItem('ams_worker_url') || '';
      document.getElementById('cfg-token').value = localStorage.getItem('ams_token') || '';
    }
  }

  function saveConfig() {
    const url   = document.getElementById('cfg-url').value.trim();
    const token = document.getElementById('cfg-token').value.trim();
    if (url)   localStorage.setItem('ams_worker_url', url);
    if (token) localStorage.setItem('ams_token', token);
    setStatus('Guardado', 'ok');
  }

  async function loadFromWorker() {
    const url   = localStorage.getItem('ams_worker_url');
    const token = localStorage.getItem('ams_token');
    if (!url || !token) { setStatus('Configura URL y token', 'err'); return; }
    setStatus('Cargando…', 'idle');
    try {
      const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
      if (!res.ok) { setStatus('Error ' + res.status, 'err'); return; }
      const data = await res.json();
      if (data.ingresos && data.gastos && data.activos && data.pasivos) {
        const { movimientos: mov, movimientos2: mov2, movimientos3: mov3, userMovRules: umr, ...rest } = data;
        state = rest;
        if (Array.isArray(mov))  { movimientos  = mov; }
        if (Array.isArray(mov2)) { movimientos2 = mov2; }
        if (Array.isArray(mov3)) { movimientos3 = mov3; }
        if (Array.isArray(umr))  { userMovRules = umr; }
        // Asignar group automáticamente a entradas que lo tengan vacío o inválido
        [movimientos, movimientos2, movimientos3].forEach(arr => ensureGroups(arr));
        updatePeriodPills(1);
        render();
        setStatus('✓ Cargado', 'ok');
      } else {
        setStatus('JSON inválido', 'err');
      }
    } catch (e) {
      setStatus('Sin conexión', 'err');
    }
  }

  function setStatus(msg, type) {
    const el = document.getElementById('cfg-status');
    el.textContent = msg;
    el.className = 'config-status status-' + type;
  }

  // ── Cargar estado de secciones expandidas ──────────────────────────
  const savedExpandedGroups = localStorage.getItem('ams_expanded_groups');
  if (savedExpandedGroups) {
    try { expandedGroups = JSON.parse(savedExpandedGroups); } catch (e) { expandedGroups = {}; }
  }
  const savedExpandedMovGroups = localStorage.getItem('ams_expanded_mov_groups');
  if (savedExpandedMovGroups) {
    try { expandedMovGroups = JSON.parse(savedExpandedMovGroups); } catch (e) { expandedMovGroups = {}; }
  }

  // Auto-fetch si hay config guardada
  (async () => {
    if (localStorage.getItem('ams_worker_url') && localStorage.getItem('ams_token')) {
      await loadFromWorker();
    }
  })();

  // ── Tabs ────────────────────────────────────────────────────
  let activeTab = 'posicion';
  function switchTab(tab) {
    activeTab = tab;
    document.getElementById('tab-posicion').style.display = tab === 'posicion' ? '' : 'none';
    document.getElementById('tab-analisis').style.display = tab === 'analisis' ? '' : 'none';
    document.getElementById('tab-movimientos').style.display = tab === 'movimientos' ? '' : 'none';
    document.getElementById('tab-btn-posicion').classList.toggle('active', tab === 'posicion');
    document.getElementById('tab-btn-analisis').classList.toggle('active', tab === 'analisis');
    document.getElementById('tab-btn-movimientos').classList.toggle('active', tab === 'movimientos');
    if (tab === 'analisis') renderAnalisis();
    if (tab === 'movimientos') { renderMovimientos(); renderChart(); }
  }

  // ── Movimientos ──────────────────────────────────────────────
  let movimientos  = [];
  let movimientos2 = [];
  let movimientos3 = [];
  let userMovRules = []; // reglas personalizadas de categorización
  // filtros movimientos

  const movRules = [
    // Interno
    { k:['traspasos propios','traspaso propio','transfer inmediata martin simon aldo',
         'liberacion fianza','constitucion fianza','devolucion puja','devolucion walter',
         'ajuste devolucion','palacio nov25','recibos varios','compra con tarjeta',
         'devolucion compra','spending tabaiba','cond.cuota tarjeta','cuota t. debit',
         'traspaso propio;caix'], cat:'interno', group:'Interno' },
    // Ingresos - Ingreso personal (nóminas, bizum, transferencias)
    { k:['00491770-martin simon aldo','martin simon aldo'], cat:'ingresos', group:'Ingreso personal' },
    { k:['bizum recibido'], cat:'ingresos', group:'Ingreso personal' },
    { k:['21033240-ruben diaz','14650100-miguel angel hernando','21033025-alba sanchez',
         '20858068-moreno cerezo','00495189-cortes serrano','01825322-aldo martin simon',
         '00730100-vasquez abella'], cat:'ingresos', group:'Ingreso personal' },
    // Ingresos - Ingreso activos (alquileres, rendimientos)
    { k:['00750167-dominguez riesco'], cat:'ingresos', group:'Ingreso activos' },
    { k:['alberto martin ge','2.plazo irpf'], cat:'ingresos', group:'Ingreso activos' },
    // Gastos - Gasto activos (hipoteca, préstamos, mantenimiento)
    { k:['sequra','pago transferencias 2650-56-0002713','pago transferencias 2650-56-0006112',
         'pago traspasos 2650-56-0005099','mutua madrile','itv guimar','taller davila',
         'serv.const.fianza','colegio de regist','ayto.de madrid','ajunt.de'], cat:'gastos', group:'Gasto activos' },
    // Gastos - Gasto supermercado
    { k:['lidl','mercadona','carrefour','aldi ','spar ','supercor','alcampo','maskom',
         'supermercados','minimarket'], cat:'gastos', group:'Gasto supermercado' },
    // Gastos - Gasto transporte
    { k:['vueling','iberia','ryanair','ouigo','renfe','naviera armas','fred.olsen',
         'bolt.eu','easypark','nyx*airserv','cronos renfe','empresa municipal',
         'sagulpa','plenergy','cedipsa','cepsa ','estacion serv','e.s. las','e.s. shell',
         'h2exagon','us016b','us016ca','us246ca','us16b','naviera','fred.'], cat:'gastos', group:'Gasto transporte' },
    // Gastos - Gasto suscripciones
    { k:['spotify','google one','openai','chatgpt','claude.ai','wellhub','kraftwerk',
         'amazon prime','sny box'], cat:'gastos', group:'Gasto suscripciones' },
    // Gastos - Gasto vida (ocio, restauración, compras personales)
    { k:['snny crossfit','crossfit','hybrid day','decathlon','multitienda olymp',
         'bar ','cafe ','cafeteria','restaurante','pingoneo','standard coffee',
         'nordis coffee','nescafe','marisma planta','table n ','faborit','komilona',
         'mostazza','factory gelat','kuups','jardin del mar','cerveceria','skinazo',
         'productores de so','tabaiba plaza','granier','922 food','sol ','pub ',
         'bar la','bar el','bar caf','bar ranea','bar soles','bar exlor',
         'cafeteria brillan','cafeteria la ria','cafeteria mi bar',
         'bizum enviado','amazon','temu','paypal','mediamarkt','media markt','agapea',
         'chinatown','sols cabell','bazar','fcia.','farmacia','tickety','vip district',
         'ibex dual','hd caletillas','hdx playa','ab servicios','islenio','yassine',
         'flippers','allday oasis','talaso','distribuciones ta',
         'hsn store','pkiflyers'], cat:'gastos', group:'Gasto vida' },
  ];

  function autoCateg(desc, detalle, importe) {
    const text = ((desc || '') + ' ' + (detalle || '')).toLowerCase();
    for (const r of userMovRules) {
      if (!text.includes(r.k.toLowerCase())) continue;
      if (r.valor != null && Math.abs(Math.abs(importe) - Math.abs(r.valor)) > 0.01) continue;
      return { cat: r.cat, group: r.group };
    }
    for (const r of movRules) {
      if (r.k.some(k => text.includes(k))) return { cat: r.cat, group: r.group };
    }
    return importe > 0
      ? { cat:'ingresos', group:'Ingreso personal' }
      : { cat:'gastos',   group:'Gasto personal' };
  }

  // ── Modal de reglas de categorización ────────────────────────
  function openRulesModal() {
    document.getElementById('rules-backdrop').classList.add('open');
    renderRulesModal();
    updateRuleGroupOpts();
    // no tag select needed
  }
  function closeRulesModal() {
    document.getElementById('rules-backdrop').classList.remove('open');
  }
  function updateRuleGroupOpts() {
    const cat = document.getElementById('rule-cat')?.value || 'gastos';
    const grps = movTagsByCategory[cat] || [];
    document.getElementById('rule-group').innerHTML = grps.map(g => `<option value="${g}">${g}</option>`).join('');
  }
  function renderRulesModal() {
    const list = document.getElementById('rules-list');
    if (!userMovRules.length) {
      list.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:8px 0">No hay reglas personalizadas</div>';
      return;
    }
    list.innerHTML = userMovRules.map((r, i) => {
      const valorLabel = r.valor != null ? ` · ${r.valor} €` : ' · todos';
      return `<div class="rules-row">
        <span style="flex:1"><strong>${r.k}</strong><span style="color:var(--text-muted)">${valorLabel} → ${r.group}</span></span>
        <button onclick="deleteUserRule(${i})" style="background:none;border:none;cursor:pointer;color:var(--neg);font-size:14px;padding:0 4px" title="Eliminar">✕</button>
      </div>`;
    }).join('');
  }
  function reapplyUserRules() {
    [movimientos, movimientos2, movimientos3].forEach(arr => {
      arr.forEach(m => {
        if (m.manualTag) return; // respetar asignaciones manuales
        const { cat, group } = autoCateg(m.desc, m.detalle || '', m.importe);
        m.cat = cat;
        m.group = group;
      });
    });
    renderMovimientos();
    markDirty();
  }
  function addUserRule() {
    const k = (document.getElementById('rule-keyword').value || '').trim();
    const cat = document.getElementById('rule-cat').value;
    const group = document.getElementById('rule-group').value;
    if (!k || !cat || !group) return;
    const valorRaw = document.getElementById('rule-valor').value.trim();
    const valor = valorRaw !== '' ? parseFloat(valorRaw) : null;
    userMovRules.push({ k, cat, group, ...(valor != null ? { valor } : {}) });
    document.getElementById('rule-keyword').value = '';
    document.getElementById('rule-valor').value = '';
    renderRulesModal();
    reapplyUserRules();
  }
  function deleteUserRule(i) {
    userMovRules.splice(i, 1);
    renderRulesModal();
    reapplyUserRules();
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n').slice(1); // skip header
    return lines.map(line => {
      const parts = line.split(';');
      if (parts.length < 5) return null;
      const fecha   = parts[0].trim();
      const desc    = parts[2].trim();
      const detalle = parts[3].trim();
      const importe = parseFloat((parts[4] || '0').trim().replace(/\./g,'').replace(',','.'));
      if (isNaN(importe)) return null;
      const { cat, group } = autoCateg(desc, detalle, importe);
      return { fecha, desc, detalle, importe, cat, group };
    }).filter(Boolean);
  }

  function parseSantanderCSV(text) {
    // Formato Santander: FECHA OPERACIÓN;FECHA VALOR;CONCEPTO;IMPORTE EUR;SALDO;
    // Col 0=fecha, Col 2=desc, Col 3=importe (sin columna detalle)
    const lines = text.trim().split('\n').slice(1); // skip header
    return lines.map(line => {
      const parts = line.split(';');
      if (parts.length < 4) return null;
      const fecha   = parts[0].trim();
      const desc    = parts[2].trim();
      const importe = parseFloat((parts[3] || '0').trim().replace(/\./g,'').replace(',','.'));
      if (isNaN(importe) || !fecha) return null;
      const { cat, group } = autoCateg(desc, '', importe);
      return { fecha, desc, detalle: '', importe, cat, group };
    }).filter(Boolean);
  }

  function clearMovimientos(acct) {
    if (acct === 1) movimientos = [];
    else if (acct === 2) movimientos2 = [];
    else movimientos3 = [];
    updatePeriodPills(1);
    renderMovimientos();
  }

  const validGroups = ['Ingreso personal','Ingreso activos','Gasto vida','Gasto supermercado','Gasto transporte','Gasto suscripciones','Gasto activos','Gasto personal','Gasto inversión','Interno'];
  function ensureGroups(arr) {
    arr.forEach(m => {
      if (m.manualTag) {
        // Si el grupo manual ya no es válido (categorías antiguas), limpiar y recategorizar
        const grps = movTagsByCategory[m.cat] || [];
        if (!m.group || !grps.includes(m.group)) {
          delete m.manualTag;
          const r = autoCateg(m.desc, m.detalle || '', m.importe);
          m.cat   = r.cat;
          m.group = r.group;
        }
        return;
      }
      // Siempre reaplicar autoCateg — garantiza grupo válido aunque el dato venga de Cloudflare con formato antiguo
      const r = autoCateg(m.desc, m.detalle || '', m.importe);
      m.cat   = r.cat;
      m.group = r.group;
    });
    return arr;
  }

  function importCSV(input, acct = 1) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      if (acct === 3) {
        movimientos3 = ensureGroups(parseSantanderCSV(e.target.result));
      } else {
        const parsed = ensureGroups(parseCSV(e.target.result));
        if (acct === 1) movimientos = parsed;
        else movimientos2 = parsed;
      }
      updatePeriodPills(1);
      renderMovimientos();
    };
    reader.readAsText(file, 'ISO-8859-1');
    input.value = '';
  }

  function updatePeriodPills() {
    const all = [...movimientos, ...movimientos2, ...movimientos3];
    // Años
    const yearSel = document.getElementById('mov-year-filter');
    if (yearSel) {
      const curYear = yearSel.value;
      const years = [...new Set(all.map(m => m.fecha.split('/')[2]))].sort().reverse();
      yearSel.innerHTML = '<option value="">Todos</option>' + years.map(y =>
        `<option value="${y}" ${y === curYear ? 'selected' : ''}>${y}</option>`
      ).join('');
    }
    // Meses — filtrados por año seleccionado
    const selYear = yearSel?.value || '';
    const monthSel = document.getElementById('mov-months-filter');
    if (monthSel) {
      const curMonth = monthSel.value;
      const months = [...new Set(all
        .filter(m => !selYear || m.fecha.split('/')[2] === selYear)
        .map(m => { const [d,mo,y] = m.fecha.split('/'); return `${y}-${mo}`; })
      )].sort().reverse();
      monthSel.innerHTML = '<option value="">Todos</option>' + months.map(p => {
        const [y, mo] = p.split('-');
        const label = new Date(+y, +mo-1, 1).toLocaleDateString('es-ES', { month:'long' });
        return `<option value="${p}" ${p === curMonth ? 'selected' : ''}>${label}</option>`;
      }).join('');
    }
  }

  // ── Gráfico mensual ────────────────────────────────────────────────
  let _chartInst = null;

  function renderChart() {
    const canvasEl = document.getElementById('mov-chart');
    if (!canvasEl) return;

    const acctF  = document.getElementById('chart-acct')?.value  || '';
    const yearF  = document.getElementById('chart-year')?.value  || '';
    const groupF = document.getElementById('chart-group')?.value || '';

    // Sincronizar años del selector del gráfico
    const all = [...movimientos, ...movimientos2, ...movimientos3];
    const chartYearSel = document.getElementById('chart-year');
    if (chartYearSel) {
      const cur = chartYearSel.value;
      const years = [...new Set(all.map(m => (m.fecha||'').split('/')[2]).filter(Boolean))].sort().reverse();
      chartYearSel.innerHTML = '<option value="">Todos los años</option>' +
        years.map(y => `<option value="${y}" ${y === cur ? 'selected':''}>${y}</option>`).join('');
    }

    // Filtrar fuente
    function srcFor(arr, ac) {
      if (acctF && acctF !== String(ac)) return [];
      return arr;
    }
    const src = [
      ...srcFor(movimientos,  1),
      ...srcFor(movimientos2, 2),
      ...srcFor(movimientos3, 3),
    ];

    // Parsear filtro de grupo
    let filterCat = '', filterGroup = '';
    if (groupF) {
      const [c, g] = groupF.split('|');
      filterCat = c; filterGroup = g;
    }

    // Acumular por mes
    const byMonth = {};
    src.forEach(m => {
      const parts = (m.fecha||'').split('/');
      if (parts.length < 3) return;
      const [, mo, y] = parts;
      if (yearF && y !== yearF) return;
      if (filterCat && m.cat !== filterCat) return;
      if (filterGroup && m.group !== filterGroup) return;
      if (!filterCat && m.cat === 'interno') return; // excluir interno salvo filtro explícito
      const key = `${y}-${mo.padStart(2,'0')}`;
      if (!byMonth[key]) byMonth[key] = { ing: 0, gas: 0 };
      if (m.cat === 'ingresos') byMonth[key].ing += m.importe;
      else byMonth[key].gas += m.importe; // gastos son negativos
    });

    const labels = Object.keys(byMonth).sort();
    if (!labels.length) {
      if (_chartInst) { _chartInst.destroy(); _chartInst = null; }
      document.getElementById('chart-kpi').textContent = '';
      canvasEl.getContext('2d').clearRect(0,0,canvasEl.width,canvasEl.height);
      return;
    }

    // Determinar modo: si hay filtro de grupo concreto mostrar solo esa serie
    const singleSeries = !!filterGroup || filterCat === 'ingresos' || filterCat === 'gastos';
    const datasets = [];

    if (!filterCat) {
      // Sin filtro: barras ingresos + barras gastos (abs)
      datasets.push({
        label: 'Ingresos',
        data: labels.map(k => +(byMonth[k].ing.toFixed(2))),
        backgroundColor: 'rgba(16,185,129,0.75)',
        borderColor: 'rgba(16,185,129,1)',
        borderWidth: 1, borderRadius: 4,
      });
      datasets.push({
        label: 'Gastos',
        data: labels.map(k => +(Math.abs(byMonth[k].gas).toFixed(2))),
        backgroundColor: 'rgba(239,68,68,0.7)',
        borderColor: 'rgba(239,68,68,1)',
        borderWidth: 1, borderRadius: 4,
      });
    } else if (filterCat === 'ingresos' && !filterGroup) {
      datasets.push({
        label: 'Ingresos',
        data: labels.map(k => +(byMonth[k].ing.toFixed(2))),
        backgroundColor: 'rgba(16,185,129,0.75)',
        borderColor: 'rgba(16,185,129,1)',
        borderWidth: 1, borderRadius: 4,
      });
    } else {
      // Filtro por grupo concreto o gastos genérico
      datasets.push({
        label: filterGroup || 'Gastos',
        data: labels.map(k => +(Math.abs(byMonth[k].gas + byMonth[k].ing).toFixed(2))),
        backgroundColor: 'rgba(99,102,241,0.75)',
        borderColor: 'rgba(99,102,241,1)',
        borderWidth: 1, borderRadius: 4,
      });
    }

    // KPI: media mensual
    const allVals = datasets[0].data;
    const total   = allVals.reduce((s,v) => s+v, 0);
    const media   = total / (allVals.length || 1);
    const fmt2    = v => new Intl.NumberFormat('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}).format(v) + ' €';
    const kpiLabel = (filterGroup || (filterCat ? filterCat : 'gastos'));
    document.getElementById('chart-kpi').textContent =
      `Media ${kpiLabel}: ${fmt2(media)}/mes · Total: ${fmt2(total)}`;

    // Etiquetas eje X legibles
    const xLabels = labels.map(k => {
      const [y, mo] = k.split('-');
      return new Date(+y,+mo-1,1).toLocaleDateString('es-ES',{month:'short',year:'2-digit'});
    });

    if (_chartInst) _chartInst.destroy();
    _chartInst = new Chart(canvasEl, {
      type: 'bar',
      data: { labels: xLabels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#1e293b', font: { family: 'Inter', size: 11 } } },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: ${fmt2(ctx.parsed.y)}`
            }
          }
        },
        scales: {
          x: { ticks: { color: '#64748b', font: { family: 'Inter', size: 10 } }, grid: { display: false } },
          y: {
            ticks: {
              color: '#64748b', font: { family: 'Inter', size: 10 },
              callback: v => new Intl.NumberFormat('es-ES',{notation:'compact'}).format(v) + ' €'
            },
            grid: { color: '#e2e8f0' },
            beginAtZero: true,
          }
        }
      }
    });
  }

  function toggleMovGroup(key) {
    expandedMovGroups[key] = !expandedMovGroups[key];
    localStorage.setItem('ams_expanded_mov_groups', JSON.stringify(expandedMovGroups));
    renderMovimientos();
  }

  function toggleMovSort(key, e) {
    e.stopPropagation();
    const cur = sortMovGroups[key] || 'fecha';
    sortMovGroups[key] = cur === 'fecha' ? 'desc' : cur === 'desc' ? 'asc' : 'fecha';
    renderMovimientos();
  }

  function updateMovTag(idx, newGroup, newCat, acct = 1) {
    const arr = acct === 1 ? movimientos : acct === 2 ? movimientos2 : movimientos3;
    arr[idx].group = newGroup;
    arr[idx].cat = newCat;
    arr[idx].manualTag = true;
    renderMovimientos();
  }

  function renderMovimientos() {
    const container = document.getElementById('mov-container');
    const kpiEl     = document.getElementById('mov-kpi');
    if (!movimientos.length && !movimientos2.length && !movimientos3.length) {
      container.innerHTML = `<div style="padding:40px;text-align:center;color:var(--text-muted);font-size:13px;grid-column:1/-1">
        Importa un CSV de tu banco para ver los movimientos
      </div>`;
      kpiEl.innerHTML = '';
      return;
    }

    // Leer filtros
    const acctFilter = document.getElementById('mov-acct-filter')?.value || '';
    const selYear    = document.getElementById('mov-year-filter')?.value  || '';
    const selMonth   = document.getElementById('mov-months-filter')?.value || '';
    const searchQ    = (document.getElementById('mov-search')?.value || '').toLowerCase().trim();
    const filterY    = selMonth ? selMonth.split('-')[0] : (selYear || null);

    function filterArr(arr, acct) {
      if (acctFilter && acctFilter !== String(acct)) return [];
      return arr.filter(m => {
        const [d, mo, y] = m.fecha.split('/');
        if (selMonth) {
          if (m.amortizar) { if (y !== filterY) return false; }
          else if (`${y}-${mo}` !== selMonth) return false;
        } else if (selYear && y !== selYear) return false;
        if (searchQ) {
          const hay = ((m.desc || '') + ' ' + (m.detalle || '')).toLowerCase();
          if (!hay.includes(searchQ)) return false;
        }
        return true;
      });
    }

    const filtered1 = filterArr(movimientos,  1);
    const filtered2 = filterArr(movimientos2, 2);
    const filtered3 = filterArr(movimientos3, 3);
    const filtered  = [...filtered1, ...filtered2, ...filtered3];

    function importeEfectivo(m) {
      if (!m.amortizar) return m.importe;
      const [d, mo, y] = m.fecha.split('/');
      if (filterY && y !== filterY) return 0;
      return m.importe / 12;
    }

    // Totales KPI — misma lógica que las cabeceras de columna
    const totI = Math.abs(filtered.filter(m => m.cat === 'ingresos' || m.cat === 'interno').reduce((s,m) => s + importeEfectivo(m), 0));
    const totG = Math.abs(filtered.filter(m => m.cat === 'gastos').reduce((s,m) => s + importeEfectivo(m), 0));
    kpiEl.innerHTML = `
      <span><span>Ingresos</span> <strong class="txt-pos">${fmt(totI)}</strong></span>
      <span><span>Gastos</span> <strong class="txt-neg">${fmt(totG)}</strong></span>
      <span><span>Balance</span> <strong class="${totI-totG>=0?'txt-pos':'txt-neg'}">${fmt(totI-totG)}</strong></span>`;

    // Orden de grupos según definición en movTagsByCategory
    const groupOrder = {};
    let _gIdx = 0;
    ['ingresos','gastos','interno'].forEach(cat => {
      (movTagsByCategory[cat] || []).forEach(grp => { groupOrder[cat + '|' + grp] = _gIdx++; });
    });

    // Dropdown helper: opciones planas por cat→grupo
    function buildCatOpts(m) {
      return ['ingresos','gastos','interno'].map(cat => {
        const grps = movTagsByCategory[cat] || [];
        return `<optgroup label="${cat}">${grps.map(grp =>
          `<option value="${cat}|${grp}" ${m.cat===cat && m.group===grp ? 'selected':''}>${grp}</option>`
        ).join('')}</optgroup>`;
      }).join('');
    }

    // Agrupar por cat+group; incompatibles aparte
    const groups = {};
    const incompatible = [];
    function routeItem(m, ac, src) {
      const grps = movTagsByCategory[m.cat] || [];
      const valid = m.group && grps.includes(m.group);
      if (!valid) {
        incompatible.push({ ...m, acct: ac, origIdx: src.indexOf(m) });
      } else {
        const key = m.cat + '|' + m.group;
        if (!groups[key]) groups[key] = { cat: m.cat, group: m.group, items: [] };
        groups[key].items.push({ ...m, acct: ac, origIdx: src.indexOf(m) });
      }
    }
    filtered1.forEach(m => routeItem(m, 1, movimientos));
    filtered2.forEach(m => routeItem(m, 2, movimientos2));
    filtered3.forEach(m => routeItem(m, 3, movimientos3));

    function buildColumn(cats) {
      const colGroups = Object.values(groups)
        .filter(g => cats.includes(g.cat))
        .sort((a,b) => (groupOrder[a.cat+'|'+a.group]||0) - (groupOrder[b.cat+'|'+b.group]||0));

      let html = '<div class="card" style="overflow:hidden">';
      const colLabel = cats.includes('ingresos') ? 'INGRESOS' : 'GASTOS';
      const colNetSum = colGroups.reduce((s,g) => s + g.items.reduce((gs,m) => gs + importeEfectivo(m), 0), 0);
      const colTotal = Math.abs(colNetSum);
      html += `<div class="card-header"><h2>${colLabel}</h2><span class="tot-val">${fmt(colTotal)}</span></div>`;

      colGroups.forEach(g => {
        const gKey = g.cat + '|' + g.group;
        const isExpanded = expandedMovGroups[gKey] !== false;
        const sortMode = sortMovGroups[gKey] || 'fecha';
        const gTotal = g.items.reduce((s,m) => s + importeEfectivo(m), 0);
        const colorCls = g.cat === 'ingresos' ? 'txt-pos' : g.cat === 'gastos' ? 'txt-neg' : '';
        const sortIcon  = sortMode === 'fecha' ? '⇅' : sortMode === 'desc' ? '↓' : '↑';
        const sortTitle = sortMode === 'fecha' ? 'Ordenar por importe ↓' : sortMode === 'desc' ? 'Ordenar por importe ↑' : 'Ordenar por fecha';

        html += `<div class="group-title-row" style="cursor:pointer" onclick="toggleMovGroup('${gKey}')">
          <span class="group-toggle ${!isExpanded ? 'collapsed' : ''}">▼</span>
          <span style="flex:1;font-size:11px;font-weight:700;color:var(--text)">${g.group}</span>
          <span style="font-size:13px;color:var(--text-muted);margin-right:8px;line-height:1" onclick="toggleMovSort('${gKey}',event)" title="${sortTitle}">${sortIcon}</span>
          <span class="group-sum ${colorCls}">${fmt(Math.abs(gTotal))}</span>
        </div>`;

        if (isExpanded) {
          const toTs = f => { const [d,mo,y] = f.split('/'); return +new Date(+y, +mo-1, +d); };
          let items = [...g.items];
          if (sortMode === 'desc') items.sort((a,b) => Math.abs(b.importe) - Math.abs(a.importe));
          else if (sortMode === 'asc') items.sort((a,b) => Math.abs(a.importe) - Math.abs(b.importe));
          else items.sort((a,b) => toTs(b.fecha) - toTs(a.fecha));

          items.forEach(m => {
            const oi = m.origIdx;
            const ac = m.acct;
            const editKey = `${ac}-${oi}`;
            const catOpts = buildCatOpts(m);
            const rowCls = m.cat === 'interno' ? 'mov-interno' : '';
            const acctBadge = (movimientos2.length || movimientos3.length) ? `<span style="font-size:9px;color:var(--text-muted);margin-left:2px">[C${ac}]</span>` : '';
            const amortLabel = (() => {
              if (!m.amortizar) return '';
              const [d, mo, y] = m.fecha.split('/');
              const mes = new Date(+y, +mo-1, 1).toLocaleDateString('es-ES', { month:'long', year:'numeric' });
              return ` <span style="font-size:10px;color:#0369a1">(Amortizado ${mes.charAt(0).toUpperCase()+mes.slice(1)})</span>`;
            })();
            const impEf = importeEfectivo(m);
            const isEditing = movEditando === editKey;
            const arr = ac === 1 ? 'movimientos' : ac === 2 ? 'movimientos2' : 'movimientos3';

            if (isEditing) {
              const descEsc = (m.desc || '').replace(/"/g,'&quot;');
              const blurClose = `(function(e){if(!e.relatedTarget||!e.relatedTarget.closest('[data-ek="${editKey}"]')){movEditando=null;renderMovimientos()}})(event)`;
              html += `<div class="mov-row ${rowCls}" style="flex-wrap:wrap;gap:4px" data-ek="${editKey}">
                <input class="mov-fecha-input" value="${m.fecha}"
                  data-ek="${editKey}"
                  onchange="${arr}[${oi}].fecha=this.value;updatePeriodPills()"
                  onblur="${blurClose}"
                  onkeydown="if(event.key==='Enter')document.getElementById('mov-edit-${editKey}').focus()"
                  placeholder="dd/mm/aaaa">
                <input class="mov-desc-input" value="${descEsc}"
                  data-ek="${editKey}"
                  onchange="${arr}[${oi}].desc=this.value"
                  onblur="${blurClose}"
                  onkeydown="if(event.key==='Enter'){movEditando=null;renderMovimientos()}"
                  id="mov-edit-${editKey}">
                <select class="mov-tag-sel" data-ek="${editKey}" onchange="(function(s){const[c,g]=s.value.split('|');updateMovTag(${oi},g,c,${ac})})(this)">${catOpts}</select>
                <span class="mov-importe ${impEf>=0?'txt-pos':'txt-neg'}">${fmt(impEf)}</span>
              </div>
              <div class="mov-edit-panel" data-ek="${editKey}">
                <input type="checkbox" class="mov-amort-check" id="amort-${editKey}" ${m.amortizar?'checked':''}
                  onmousedown="event.preventDefault();${arr}[${oi}].amortizar=!${arr}[${oi}].amortizar;renderMovimientos()">
                <label class="mov-amort-label" for="amort-${editKey}">Amortizar en el año (÷12 meses)</label>
              </div>`;
            } else {
              html += `<div class="mov-row ${rowCls}">
                <span class="mov-fecha" onclick="movEditando='${editKey}';movEditandoFecha=true;renderMovimientos()" title="Click para editar">${m.fecha.slice(0,5)}</span>
                <span class="mov-desc" style="cursor:text" onclick="movEditando='${editKey}';renderMovimientos()">${m.desc}${acctBadge}${amortLabel}</span>
                <select class="mov-tag-sel" onchange="(function(s){const[c,g]=s.value.split('|');updateMovTag(${oi},g,c,${ac})})(this)">${catOpts}</select>
                <span class="mov-importe ${impEf>=0?'txt-pos':'txt-neg'}">${fmt(impEf)}</span>
              </div>`;
            }
          });
        }
      });

      if (colGroups.length === 0) {
        html += `<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:11px">Sin movimientos</div>`;
      }
      html += '</div>';
      return html;
    }

    function buildIncompatibleSection() {
      if (!incompatible.length) return '';
      const toTs = f => { const [d,mo,y] = f.split('/'); return +new Date(+y, +mo-1, +d); };
      const sorted = [...incompatible].sort((a,b) => toTs(b.fecha) - toTs(a.fecha));
      const acctBadge = (ac) => (movimientos2.length || movimientos3.length)
        ? `<span style="font-size:9px;color:var(--text-muted);margin-left:2px">[C${ac}]</span>` : '';
      let html = `<div class="card" style="overflow:hidden;grid-column:1/-1">
        <div class="card-header" style="background:#92400e">
          <h2>SIN CATEGORÍA VÁLIDA</h2>
          <span class="tot-val" style="font-size:10px;opacity:0.8">${sorted.length} concepto${sorted.length!==1?'s':''} · asigna un tag para clasificarlos</span>
        </div>`;
      sorted.forEach(m => {
        const oi = m.origIdx;
        const ac = m.acct;
        const impEf = importeEfectivo(m);
        const tagLabel = `<span style="font-size:10px;color:#92400e;margin-left:4px">[${m.group||m.cat||'?'}/${m.tag||'?'}]</span>`;
        html += `<div class="mov-row" style="background:#fffbeb">
          <span class="mov-fecha">${m.fecha.slice(0,5)}</span>
          <span class="mov-desc">${m.desc}${acctBadge(ac)}${tagLabel}</span>
          <select class="mov-tag-sel" onchange="(function(s){const[c,g]=s.value.split('|');updateMovTag(${oi},g,c,${ac})})(this)">
            <option value="">-- Asignar --</option>${buildCatOpts(m)}
          </select>
          <span class="mov-importe ${impEf>=0?'txt-pos':'txt-neg'}">${fmt(impEf)}</span>
        </div>`;
      });
      html += '</div>';
      return html;
    }

    container.innerHTML = buildColumn(['ingresos','interno']) + buildColumn(['gastos']) + buildIncompatibleSection();
    renderChart();

    if (movEditando !== null) {
      const inp = document.getElementById(`mov-edit-${movEditando}`);
      if (inp) { inp.focus(); inp.select(); }
      // Si se hizo click en fecha, focus en fecha
      const fechaInp = document.querySelector(`[data-ek="${movEditando}"].mov-fecha-input`);
      if (fechaInp && movEditandoFecha) { fechaInp.focus(); fechaInp.select(); movEditandoFecha = false; }
    }
  }

  // ── Ratios ──────────────────────────────────────────────────
  function byTag(cat, tags) {
    const norm = t => (t || '').trim().toLowerCase();
    const normTags = tags.map(norm);
    return state[cat].flatMap(g => g.items)
      .filter(i => normTags.includes(norm(i.type)))
      .reduce((s, i) => s + Number(i.value), 0);
  }
  function total(cat) {
    return state[cat].flatMap(g => g.items).reduce((s, i) => s + Number(i.value), 0);
  }

  function calcRatios() {
    const tI = total('ingresos'), tG = total('gastos');
    const tA = total('activos'),  tP = total('pasivos');
    const pn = tA - tP;
    const n  = v => fmtNum(Math.round(v));

    // Suma por tags como cadena de números: "839 + 252 + 337"
    const nv = (cat, tags) => {
      const norm2 = t => (t||'').trim().toLowerCase();
      const nt = tags.map(norm2);
      const vals = state[cat].flatMap(g => g.items)
        .filter(i => nt.includes(norm2(i.type))).map(i => n(i.value));
      return vals.length ? vals.join(' + ') : '0';
    };

    const hipG  = byTag('gastos',   ['Hipoteca']);
    const preG  = byTag('gastos',   ['Préstamo']);
    const propG = byTag('gastos',   ['Mantenimiento propiedades']);
    const trabI = byTag('ingresos', ['Trabajo']);
    const rentI = byTag('ingresos', ['Renta']);
    const liq   = byTag('activos',  ['Liquidez']);
    const inm   = byTag('activos',  ['Inmobiliario']);
    const ingDem  = trabI + rentI;
    const cirbe   = hipG + preG;
    const esfReal = hipG + preG + propG;
    const rentas  = rentI * 12;

    return [
      { name: 'Tasa esfuerzo CIRBE',
        tags:   'Hipoteca + Préstamo / Trabajo + Renta',
        legend: `${nv('gastos',['Hipoteca','Préstamo'])} / ${nv('ingresos',['Trabajo','Renta'])}`,
        value: ingDem > 0 ? cirbe   / ingDem : 0, fmt:'%', limit:0.35, dir:'lower',  obj:'< 35%' },
      { name: 'Tasa esfuerzo real',
        tags:   'Hipoteca + Préstamo + Mantenimiento propiedades / Trabajo + Renta',
        legend: `${nv('gastos',['Hipoteca','Préstamo','Mantenimiento propiedades'])} / ${nv('ingresos',['Trabajo','Renta'])}`,
        value: ingDem > 0 ? esfReal / ingDem : 0, fmt:'%', limit:0.40, dir:'lower',  obj:'< 40%' },
      { name: 'Tasa de ahorro',
        tags:   'Ingresos − Gastos / Ingresos',
        legend: `${n(tI)} − ${n(tG)} / ${n(tI)}`,
        value: tI     > 0 ? (tI-tG) / tI    : 0, fmt:'%', limit:0.20, dir:'higher', obj:'> 20%' },
      { name: 'Ratio deuda / activos',
        tags:   'Total Pasivos / Total Activos',
        legend: `${n(tP)} / ${n(tA)}`,
        value: tA     > 0 ? tP      / tA    : 0, fmt:'%', limit:0.60, dir:'lower',  obj:'< 60%' },
      { name: 'Cobertura de liquidez',
        tags:   'Liquidez / Total Gastos',
        legend: `${nv('activos',['Liquidez'])} / ${n(tG)}`,
        value: tG     > 0 ? liq     / tG    : 0, fmt:'x', limit:6,    dir:'higher', obj:'> 6 mes' },
      { name: 'Yield inmobiliario',
        tags:   'Renta × 12 / Inmobiliario',
        legend: `${nv('ingresos',['Renta'])} × 12 / ${nv('activos',['Inmobiliario'])}`,
        value: inm    > 0 ? rentas  / inm   : 0, fmt:'%', limit:0.04, dir:'higher', obj:'> 4%' },
      { name: 'Diversificación inmob.',
        tags:   'Inmobiliario / Total Activos',
        legend: `${nv('activos',['Inmobiliario'])} / ${n(tA)}`,
        value: tA     > 0 ? inm     / tA    : 0, fmt:'%', limit:0.60, dir:'lower',  obj:'< 60%' },
      { name: 'Apalancamiento',
        tags:   'Total Activos / Activos − Pasivos',
        legend: `${n(tA)} / ${n(tA)} − ${n(tP)}`,
        value: pn     > 0 ? tA      / pn    : 0, fmt:'x', limit:3,    dir:'lower',  obj:'< 3×' },
    ];
  }

  function semaforo(r) {
    if (r.dir === 'lower')  return r.value <= r.limit * 0.75 ? 'ok' : r.value <= r.limit ? 'warn' : 'crit';
    return r.value >= r.limit ? 'ok' : r.value >= r.limit * 0.65 ? 'warn' : 'crit';
  }

  function renderAnalisis() {
    const ratios = calcRatios();
    const colorMap = { ok: 'var(--pos)', warn: '#f59e0b', crit: 'var(--neg)' };
    const labelMap = { ok: 'obj-ok', warn: 'obj-warn', crit: 'obj-crit' };

    const html = ratios.map(r => {
      const s    = semaforo(r);
      const color = colorMap[s];
      const pct  = r.fmt === '%'
        ? (r.value * 100).toFixed(1) + '%'
        : r.value.toFixed(1) + '×';
      const barW = r.dir === 'lower'
        ? Math.min(r.value / r.limit, 1.2) * 100
        : Math.min(r.value / r.limit, 1)   * 100;

      return `<div class="ratio-card">
        <div class="ratio-header">
          <span class="ratio-name">${r.name}</span>
          <span class="ratio-objetivo ${labelMap[s]}">${r.obj}</span>
        </div>
        <div class="ratio-value" style="color:${color}">${pct}</div>
        <div class="ratio-bar-wrap">
          <div class="ratio-bar" style="width:${barW}%;background:${color}"></div>
        </div>
        <div class="ratio-formula">${r.tags}</div>
        <div class="ratio-formula" style="color:#94a3b8">${r.legend}</div>
      </div>`;
    }).join('');

    document.getElementById('ratios-container').innerHTML = html;

    // Auditoría de tags
    const tagRatios = {
      'trabajo':'CIRBE · Esfuerzo real', 'renta':'CIRBE · Esfuerzo real · Yield',
      'hipoteca':'CIRBE · Esfuerzo real', 'préstamo':'CIRBE · Esfuerzo real',
      'propiedad':'Esfuerzo real', 'inmobiliario':'Yield · Diversificación',
      'liquidez':'Cobertura liquidez'
    };
    const norm2 = t => (t||'').trim().toLowerCase();
    let audit = `<div class="card" style="overflow:hidden">
      <div class="card-header"><h2>Auditoría de tags</h2></div>
      <table style="width:100%;border-collapse:collapse;font-size:11px"><thead>
        <tr style="background:#f1f5f9">
          <th style="padding:6px 10px;text-align:left;color:var(--text-muted);font-weight:700">Concepto</th>
          <th style="padding:6px 10px;text-align:left;color:var(--text-muted);font-weight:700">Categoría</th>
          <th style="padding:6px 10px;text-align:left;color:var(--text-muted);font-weight:700">Tag</th>
          <th style="padding:6px 10px;text-align:right;color:var(--text-muted);font-weight:700">Valor</th>
          <th style="padding:6px 10px;text-align:left;color:var(--text-muted);font-weight:700">Usado en</th>
        </tr></thead><tbody>`;
    ['ingresos','gastos','activos','pasivos'].forEach(cat => {
      state[cat].flatMap(g => g.items).forEach(item => {
        const key = norm2(item.type);
        const usedIn = tagRatios[key] || (cat==='pasivos' ? 'Deuda/Activos · Apalancamiento' : 'Totales');
        const usedInRatio = !!tagRatios[key];
        audit += `<tr style="border-bottom:1px solid #f1f5f9">
          <td style="padding:5px 10px">${item.label}</td>
          <td style="padding:5px 10px;color:var(--text-muted);text-transform:capitalize">${cat}</td>
          <td style="padding:5px 10px;font-weight:700;color:${usedInRatio?'var(--pos)':'var(--text-muted)'}">${item.type}</td>
          <td style="padding:5px 10px;text-align:right;font-weight:600">${fmt(item.value)}</td>
          <td style="padding:5px 10px;color:var(--text-muted);font-size:10px">${usedIn}</td>
        </tr>`;
      });
    });
    audit += `</tbody></table></div>`;
    document.getElementById('audit-container').innerHTML = audit;
  }

  function copyMovAsesor() {
    const fmtE = v => new Intl.NumberFormat('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(v) + ' €';
    const all  = [...movimientos, ...movimientos2, ...movimientos3];
    if (!all.length) { alert('No hay movimientos cargados.'); return; }

    // Rango de fechas
    const toTs = f => { const [d,m,y] = (f||'').split('/'); return +new Date(+y,+m-1,+d); };
    const sortedAll = [...all].sort((a,b) => toTs(a.fecha) - toTs(b.fecha));
    const fechaMin = sortedAll[0].fecha;
    const fechaMax = sortedAll[sortedAll.length-1].fecha;

    // ── 1. Generar y descargar CSV con todos los movimientos ──────────
    const csvHeader = 'FECHA;CONCEPTO;DETALLE;IMPORTE;CATEGORIA;GRUPO\n';
    const csvRows = sortedAll.map(m => {
      const esc = v => '"' + String(v||'').replace(/"/g,'""') + '"';
      return [m.fecha, esc(m.desc), esc(m.detalle||''), String(m.importe).replace('.',','), m.cat||'', m.group||''].join(';');
    }).join('\n');
    const csvBlob = new Blob(['\uFEFF' + csvHeader + csvRows], { type: 'text/csv;charset=utf-8;' });
    const csvUrl  = URL.createObjectURL(csvBlob);
    const csvLink = document.createElement('a');
    const csvFileName = `movimientos_${fechaMin.replace(/\//g,'-')}_${fechaMax.replace(/\//g,'-')}.csv`;
    csvLink.href = csvUrl;
    csvLink.download = csvFileName;
    csvLink.click();
    setTimeout(() => URL.revokeObjectURL(csvUrl), 3000);

    // ── 2. Construir y copiar el prompt ───────────────────────────────
    const prompt = `Eres un asesor financiero independiente especializado en análisis de flujos de caja personales.

Te adjunto un fichero CSV con todos mis movimientos bancarios reales.
Estructura del fichero (separador ";"):
- FECHA: formato DD/MM/AAAA
- CONCEPTO: descripción del movimiento
- DETALLE: información adicional del banco
- IMPORTE: positivo = ingreso, negativo = gasto (en euros)
- CATEGORIA: ingresos / gastos / interno
- GRUPO: subcategoría (ej. "Gasto vida", "Gasto activos", "Ingreso personal", "Interno")

IMPORTANTE: Los movimientos con CATEGORIA "interno" son traspasos entre mis propias cuentas bancarias. Exclúyelos del análisis de flujos de caja reales.

A partir del fichero completo, analiza patrones, frecuencias, importes, estacionalidad y comportamiento por concepto individual.

Estructura tu respuesta en dos partes:

**PARTE 1 — ANÁLISIS DIRECTO**
Redacta un análisis narrativo de mis flujos de caja: cómo entran y salen los ingresos, qué categorías concentran más gasto, si hay estacionalidad, conceptos recurrentes relevantes, anomalías o gastos puntuales destacables. Sé directo y cita cifras y fechas concretas del CSV.

**PARTE 2 — RESUMEN EN TABLAS**

*5 Fortalezas de mis flujos de caja*
| # | Fortaleza | Evidencia concreta del CSV | Valoración |
|---|-----------|---------------------------|------------|

*5 Aspectos a mejorar en mi comportamiento financiero*
| # | Aspecto | Evidencia concreta del CSV | Impacto estimado |
|---|---------|-----------------------------|-----------------|

*5 Acciones concretas a tomar*
| # | Acción | Justificación con datos del CSV | Ahorro/beneficio esperado | Prioridad |
|---|--------|--------------------------------|--------------------------|-----------|

No uses lenguaje genérico ni suposiciones externas al CSV.`;

    navigator.clipboard.writeText(prompt).then(() => {
      const btn = document.getElementById('btn-mov-asesor');
      btn.textContent = '✓ CSV + Prompt';
      btn.classList.add('copied');
      setTimeout(() => { btn.innerHTML = '✦ Asesor'; btn.classList.remove('copied'); }, 3000);
    });
  }

  function copyToAsesor() {
    const sum = cat => state[cat].flatMap(g => g.items).reduce((s, i) => s + Number(i.value), 0);
    const totalIngresos = sum('ingresos');
    const totalGastos   = sum('gastos');
    const totalActivos  = sum('activos');
    const totalPasivos  = sum('pasivos');
    const patrimonioNeto = totalActivos - totalPasivos;
    const ahorroMensual  = totalIngresos - totalGastos;

    const fmtP = v => new Intl.NumberFormat('es-ES').format(Math.round(v)) + ' €';

    const bloque = (cat, titulo) => {
      let txt = `\n## ${titulo.toUpperCase()}\n`;
      state[cat].forEach(g => {
        const gSum = g.items.reduce((s, i) => s + Number(i.value), 0);
        txt += `\n### ${g.title} — ${fmtP(gSum)}\n`;
        g.items.forEach(i => { txt += `  - ${i.label} [${i.type}]: ${fmtP(i.value)}\n`; });
      });
      return txt;
    };

    const prompt = `Eres un asesor financiero independiente. Analiza mi posición patrimonial actual y proporciona un informe estructurado.

━━━ POSICIÓN PATRIMONIAL — ${new Date().toLocaleDateString('es-ES', {day:'numeric', month:'long', year:'numeric'})} ━━━
${bloque('ingresos','Ingresos mensuales')}${bloque('gastos','Gastos mensuales')}${bloque('activos','Activos')}${bloque('pasivos','Pasivos')}
━━━ RESUMEN ━━━
  Ingresos totales:  ${fmtP(totalIngresos)}/mes
  Gastos totales:    ${fmtP(totalGastos)}/mes
  Ahorro mensual:    ${fmtP(ahorroMensual)}/mes
  Total activos:     ${fmtP(totalActivos)}
  Total pasivos:     ${fmtP(totalPasivos)}
  Patrimonio neto:   ${fmtP(patrimonioNeto)}

━━━ SOLICITUD DE ANÁLISIS ━━━
Con los datos anteriores, proporciona:

1. **5 FORTALEZAS** de mi posición financiera actual (con argumentos numéricos concretos).

2. **5 ACCIONES PRIORITARIAS** que debería tomar en los próximos 12 meses para mejorar mi posición (ordenadas por impacto, con estimación del beneficio esperado). Por ejemplo: optimizar inmuebles sin alquilar, diversificar fuera del inmobiliario, reducir deuda, etc.

3. **5 RATIOS DE SOLVENCIA** más relevantes para mi perfil, calculados con mis datos reales:
   - Nombre del ratio
   - Valor calculado
   - Interpretación (semáforo: bueno / mejorable / crítico)
   - Benchmark de referencia

Sé directo, numérico y accionable. No uses lenguaje genérico.`;

    navigator.clipboard.writeText(prompt).then(() => {
      const btn = document.getElementById('btn-asesor');
      btn.textContent = '✓ Copiado';
      btn.classList.add('copied');
      setTimeout(() => { btn.innerHTML = '✦ Asesor'; btn.classList.remove('copied'); }, 2500);
    });
  }

  document.getElementById('date').textContent =
    new Date().toLocaleDateString('es-ES', { day: 'numeric', month: 'short' }).toUpperCase();
  render();
</script>
</body>
</html>
